AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31

Parameters:
  DatabaseUrl:
    Type: String
    NoEcho: true
    Description: "Postgres connection string (Neon) — passed via --parameter-overrides, never committed here."
  JwtSecret:
    Type: String
    NoEcho: true
    Description: "Secret used to sign customer/staff/admin JWTs — passed via --parameter-overrides, never committed here."
  JwtExpireMinutes:
    Type: String
    Default: "720"
  EnvironmentName:
    Type: String
    Default: "production"
    AllowedValues:
      - production
      - development
    Description: "Gates dev-only behavior (e.g. the demo OTP bypass) — must stay 'production' for real deployments."
  RazorpayKeyId:
    Type: String
    Default: "rzp_test_ODe90LnhMp9uJZ"
    Description: "Razorpay key id — test-mode default; pass a live key via --parameter-overrides for production."
  RazorpayKeySecret:
    Type: String
    NoEcho: true
    Default: "NW8HvE7ae5JhoRcAn41K9mnt"
    Description: "Razorpay key secret — test-mode default; pass a live secret via --parameter-overrides for production."
  CorsOriginRegex:
    Type: String
    Default: "^https?://localhost(:\\d+)?$|^https://([a-z0-9-]+\\.)?renowneyewear\\.com$"
    Description: "Regex of allowed CORS origins (admin/staff/customer portals + any subdomain of renowneyewear.com). Override via --parameter-overrides for a different domain."

Globals:
  Function:
    Timeout: 900
    MemorySize: 1792
    Tags:
      project: "renown-api"
      environment: "production"
  Api:
    BinaryMediaTypes:
      - "image~1*"
      - "multipart~1form-data"

Resources:
  RenownHttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: $default
      Tags:
        project: renown-api
        environment: production

  FastApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      Runtime: python3.13
      Architectures:
        - x86_64
      Handler: app.main.handler
      CodeUri: .
      Environment:
        Variables:
          DATABASE_URL: !Ref DatabaseUrl
          JWT_SECRET: !Ref JwtSecret
          JWT_EXPIRE_MINUTES: !Ref JwtExpireMinutes
          ENVIRONMENT: !Ref EnvironmentName
          RAZORPAY_KEY_ID: !Ref RazorpayKeyId
          RAZORPAY_KEY_SECRET: !Ref RazorpayKeySecret
          CORS_ORIGIN_REGEX: !Ref CorsOriginRegex
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - s3:PutObject
                - s3:GetObject
              Resource: !Sub "arn:aws:s3:::renown-api/*"
      Events:
        ApiRoot:
          Type: HttpApi
          Properties:
            ApiId: !Ref RenownHttpApi
            Path: /
            Method: ANY
            TimeoutInMillis: 29000
            PayloadFormatVersion: "2.0"
        ApiProxy:
          Type: HttpApi
          Properties:
            ApiId: !Ref RenownHttpApi
            Path: /{proxy+}
            Method: ANY
            TimeoutInMillis: 29000
            PayloadFormatVersion: "2.0"

  FastApiLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${FastApiFunction}"
      RetentionInDays: 7

Outputs:
  ApiId:
    Description: "HTTP API Gateway ID"
    Value: !Ref RenownHttpApi
  FastApiApi:
    Description: "Renown API Gateway URL (dual-stack IPv4/IPv6)"
    Value: !Sub "https://${RenownHttpApi}.execute-api.${AWS::Region}.amazonaws.com/"
  HealthCheckUrl:
    Description: "Health check endpoint"
    Value: !Sub "https://${RenownHttpApi}.execute-api.${AWS::Region}.amazonaws.com/health"
